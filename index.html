  const catBg530={Electrical:'var(--blue3)',Plumbing:'var(--amber3)',HVAC:'var(--teal3)'};

  return h('div',null,
    showActModal&&h(ActModal,null),

    h('div',{className:'page-header'},
      h('div',null,
        h('div',{className:'page-title'},'Dry Cost Register'),
        h('div',{className:'page-sub'},'Unit cost per villa type — Material & Installation for all MEP disciplines')
      ),
      h('div',{className:'header-actions'},
        h('button',{className:'btn btn-ghost',onClick:()=>{setEditAct(null);setShowActModal(true);}},h(Icon,{name:'plus',size:14}),'Add Activity'),
        h('button',{className:'btn btn-amber',onClick:exportPDF},h(Icon,{name:'download',size:14}),'Export PDF')
      )
    ),

    h('div',{className:'content'},

      // ── Project-wide weighted totals section ──
      h('div',{style:{marginBottom:22}},
        // Header row
        h('div',{style:{display:'flex',alignItems:'baseline',gap:12,marginBottom:12}},
          h('div',{style:{fontWeight:700,fontSize:13,color:'var(--text)'}},
            'Project Total — ',h('span',{style:{color:'var(--amber)'}},totalVillas530>0?totalVillas530+' Villas':'All Villa Types')
          ),
          h('div',{style:{fontSize:11,color:'var(--text3)'}},
            totalVillas530>0
              ?'(unit cost × villa quantities across all TH blocks)'
              :'(showing unit cost sums — set villa quantities in Setup to see weighted totals)'
          )
        ),
        // Discipline breakdown cards
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr) 1.1fr',gap:12}},
          // One card per discipline
          ...CATEGORIES.map(cat=>h('div',{key:cat,style:{
            background:'#fff',border:'1.5px solid '+catColors530[cat]+'33',
            borderTop:'3px solid '+catColors530[cat],
            borderRadius:'var(--radius2)',padding:'14px 16px',
            boxShadow:'0 1px 4px rgba(0,0,0,.06)'
          }},
            h('div',{style:{fontSize:10,fontWeight:700,color:catColors530[cat],textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}},cat),
            h('div',{style:{display:'flex',gap:8,marginBottom:hasQty?8:0}},
              h('div',{style:{flex:1,background:catBg530[cat],borderRadius:'var(--radius)',padding:'8px 10px'}},
                h('div',{style:{fontSize:9,color:'var(--text3)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}},'Material'),
                h('div',{style:{fontFamily:'monospace',fontWeight:700,fontSize:13,color:'var(--green2)'}},
                  discTotals[cat]?.mat>0?fmt(discTotals[cat].mat):'—'
                )
              ),
              h('div',{style:{flex:1,background:'var(--blue3)',borderRadius:'var(--radius)',padding:'8px 10px'}},
                h('div',{style:{fontSize:9,color:'var(--text3)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}},'Installation'),
                h('div',{style:{fontFamily:'monospace',fontWeight:700,fontSize:13,color:'var(--blue2)'}},
                  discTotals[cat]?.inst>0?fmt(discTotals[cat].inst):'—'
                )
              )
            ),
            // Per villa type breakdown
            hasQty&&h('div',{style:{borderTop:'1px solid var(--border)',paddingTop:6}},
              allVillaTypes.map(vt=>{
                const qty=vtQty[vt]||0;
                if(!qty)return null;
                const ct=getCatTotal(vt,cat);
                return h('div',{key:vt,style:{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',padding:'2px 0',fontFamily:'monospace'}},
                  h('span',{style:{color:'var(--text2)',fontWeight:500}},vt,' ×',qty),
                  h('span',null,ct.mat>0?fmt(ct.mat*qty):'—')
                );
              })
            )
          )),
          // Grand total card
          h('div',{style:{
            background:'linear-gradient(135deg,var(--sidebar) 0%,#2d4a6e 100%)',
            borderRadius:'var(--radius2)',padding:'14px 16px',
            boxShadow:'0 2px 6px rgba(0,0,0,.12)'
          }},
            h('div',{style:{fontSize:10,fontWeight:700,color:'#7a99bb',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}},'Grand Total'),
            h('div',{style:{fontFamily:'monospace',fontWeight:800,fontSize:17,color:'#f5c842',marginBottom:6}},
              projMat+projInst>0?fmt(projMat+projInst):'—'
            ),
            h('div',{style:{display:'flex',gap:10}},
              h('div',null,
                h('div',{style:{fontSize:9,color:'#7a99bb',marginBottom:2}},'MAT'),
                h('div',{style:{fontFamily:'monospace',fontWeight:700,fontSize:12,color:'#4ade80'}},projMat>0?fmt(projMat):'—')
              ),
              h('div',{style:{width:1,background:'rgba(255,255,255,.15)'}}),
              h('div',null,
                h('div',{style:{fontSize:9,color:'#7a99bb',marginBottom:2}},'INSTALL'),
                h('div',{style:{fontFamily:'monospace',fontWeight:700,fontSize:12,color:'#60a5fa'}},projInst>0?fmt(projInst):'—')
              )
            )
          )
        )
      ),

      // Villa type selector tabs
      h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:22,borderBottom:'2px solid var(--border)',paddingBottom:0}},
        allVillaTypes.map(vt=>{
          const active=curVilla===vt;
          const t=getVillaTotals(vt);
          const hasData=t.total>0;
          const vtColor=(villaTypeDB.find(v=>v.name===vt)||{}).color||'#2563eb';
          return h('button',{key:vt,onClick:()=>setSelVilla(vt),style:{
            padding:'9px 18px',border:'none',
            borderBottom:active?`2px solid ${vtColor}`:'2px solid transparent',
            marginBottom:-2,background:'transparent',cursor:'pointer',
            fontWeight:active?700:400,fontSize:13,
            color:active?vtColor:'var(--text2)',
            transition:'all .15s',display:'flex',alignItems:'center',gap:6
          }},
            h('span',{style:{width:7,height:7,borderRadius:'50%',background:hasData?'var(--green)':'#ddd',display:'inline-block'}}),
            vt
          );
        })
      ),

      // Current villa type sheet — PDF format with all 3 disciplines stacked
      curVilla&&h('div',null,
        // Villa type header banner
        h('div',{style:{
          background:'linear-gradient(135deg,var(--sidebar) 0%,#2d4a6e 100%)',
          borderRadius:'var(--radius2)',padding:'16px 24px',marginBottom:22,
          display:'flex',justifyContent:'space-between',alignItems:'center'
        }},
          h('div',null,
            h('div',{style:{fontSize:11,color:'#7a99bb',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:4}},'Dry Cost Sheet'),
            h('div',{style:{fontSize:22,fontWeight:700,color:'#f5c842',fontFamily:'IBM Plex Mono,monospace'}},'DRY COST — ',curVilla)
          ),
          h('div',{style:{display:'flex',gap:24,textAlign:'right'}},
            h('div',null,
              h('div',{style:{fontSize:10,color:'#7a99bb',textTransform:'uppercase',marginBottom:3}},'Total Material'),
              h('div',{style:{fontSize:18,fontWeight:700,color:'#4ade80',fontFamily:'monospace'}},
                (()=>{const t=getVillaTotals(curVilla);return t.mat>0?fmt(t.mat):'—';})()
              )
            ),
            h('div',null,
              h('div',{style:{fontSize:10,color:'#7a99bb',textTransform:'uppercase',marginBottom:3}},'Total Installation'),
              h('div',{style:{fontSize:18,fontWeight:700,color:'#60a5fa',fontFamily:'monospace'}},
                (()=>{const t=getVillaTotals(curVilla);return t.inst>0?fmt(t.inst):'—';})()
              )
            ),
            h('div',null,
              h('div',{style:{fontSize:10,color:'#7a99bb',textTransform:'uppercase',marginBottom:3}},'Grand Total'),
              h('div',{style:{fontSize:18,fontWeight:700,color:'#f5c842',fontFamily:'monospace'}},
                (()=>{const t=getVillaTotals(curVilla);return t.total>0?fmt(t.total):'—';})()
              )
            )
          )
        ),

        // Three discipline tables stacked exactly like PDF
        CATEGORIES.map(cat=>h(DisciplineTable,{key:cat,vt:curVilla,cat})),

        // Projected total across all THs using this villa type
        (()=>{
          const ths=data.townhouses.filter(th=>th.villaTypes.some(v=>v.type===curVilla));
          if(ths.length===0)return null;
          const gt=getVillaTotals(curVilla);
          return h('div',{className:'card',style:{borderColor:'var(--amber2)',marginTop:8}},
            h('div',{className:'card-title',style:{color:'var(--amber)'}},'Projected LPO Value — THs using '+curVilla),
            h('div',{className:'table-wrap'},
              h('table',null,
                h('thead',null,h('tr',null,h('th',null,'Townhouse'),h('th',{className:'num'},'Qty'),h('th',{className:'num'},'Material LPO'),h('th',{className:'num'},'Subcon LPO'),h('th',{className:'num'},'Total LPO'))),
                h('tbody',null,
                  ...ths.map(th=>{
                    const qty=th.villaTypes.filter(v=>v.type===curVilla).reduce((s,v)=>s+v.count,0);
                    return h('tr',{key:th.id},
                      h('td',null,h('b',{style:{color:'var(--amber)'}},th.name)),
                      h('td',{className:'num'},h('span',{className:'badge badge-blue'},qty,'×')),
                      h('td',{className:'num',style:{color:'var(--green2)'}},fmt(gt.mat*qty)),
                      h('td',{className:'num',style:{color:'var(--blue2)'}},fmt(gt.inst*qty)),
                      h('td',{className:'num',style:{fontWeight:700,color:'var(--amber)'}},fmt(gt.total*qty))
                    );
                  }),
                  (()=>{
                    const totalQty=ths.reduce((s,th)=>s+th.villaTypes.filter(v=>v.type===curVilla).reduce((ss,v)=>ss+v.count,0),0);
                    return h('tr',{className:'summary-row'},
                      h('td',null,'TOTAL'),
                      h('td',{className:'num',style:{fontFamily:'monospace',fontWeight:700}},totalQty,'×'),
                      h('td',{className:'num',style:{fontFamily:'monospace',fontWeight:700,color:'var(--green2)'}},fmt(gt.mat*totalQty)),
                      h('td',{className:'num',style:{fontFamily:'monospace',fontWeight:700,color:'var(--blue2)'}},fmt(gt.inst*totalQty)),
                      h('td',{className:'num',style:{fontFamily:'monospace',fontWeight:700,color:'var(--amber)'}},fmt(gt.total*totalQty))
                    );
                  })()
                )
              )
            )
          );
        })()
      )
    )
  );
};

/* ============ DATABASE PAGE ============ */
const DatabasePage=({data,setData})=>{
  const[activeTab,setActiveTab]=useState('townhouses');
  const[showVTModal,setShowVTModal]=useState(false);
  const[editVT,setEditVT]=useState(null);
  const[editingTH,setEditingTH]=useState(null);
  const[showAddTH,setShowAddTH]=useState(false);
  const[rowEdit,setRowEdit]=useState({});

  const villaTypeDB=data.villaTypeDB||VILLA_TYPE_PRESETS.map((n,i)=>({id:`vt${i+1}`,name:n,description:'',color:'#2563eb'}));
  const allVTNames=villaTypeDB.map(v=>v.name);

  const saveVT=(vt)=>{
    setData(d=>{
      const db=d.villaTypeDB||[];
      if(editVT){return{...d,villaTypeDB:db.map(v=>v.id===editVT.id?{...v,...vt}:v)};}
      return{...d,villaTypeDB:[...db,{id:uid(),...vt}]};
    });
    setShowVTModal(false);setEditVT(null);
  };
  const deleteVT=(id)=>{
    if(!confirm('Delete this villa type?'))return;
    setData(d=>({...d,villaTypeDB:(d.villaTypeDB||[]).filter(v=>v.id!==id)}));
  };

  const TH_PRESETS=Array.from({length:33},(_,i)=>`TH-${String(i+1).padStart(2,'0')}`);
  const existingNames=new Set(data.townhouses.map(t=>t.name));
  const sortedTHs=[...data.townhouses].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
  const totalVillas=data.townhouses.reduce((s,th)=>s+th.villaTypes.reduce((ss,v)=>ss+v.count,0),0);

  const startEdit=(thId)=>{
    const th=data.townhouses.find(t=>t.id===thId);
    const init={};
    allVTNames.forEach(vt=>{const f=th.villaTypes.find(v=>v.type===vt);init[vt]=f?f.count:'';});
    setRowEdit(r=>({...r,[thId]:init}));setEditingTH(thId);
  };
  const cancelEdit=(thId)=>{setRowEdit(r=>{const n={...r};delete n[thId];return n;});setEditingTH(null);};
  const saveEdit=(thId)=>{
    const vals=rowEdit[thId]||{};
    const villaTypes=allVTNames.filter(vt=>(parseInt(vals[vt])||0)>0).map(vt=>({id:uid(),type:vt,count:parseInt(vals[vt])||0}));
    setData(d=>({...d,townhouses:d.townhouses.map(t=>t.id===thId?{...t,villaTypes}:t)}));
    cancelEdit(thId);
  };
  const deleteTH=(id)=>{if(!confirm('Remove this townhouse?'))return;setData(d=>({...d,townhouses:d.townhouses.filter(t=>t.id!==id)}));};

  // Bulk Add modal state
  const[showBulkModal,setShowBulkModal]=useState(false);
  const[bulkPrefix,setBulkPrefix]=useState('TH-');
  const[bulkFrom,setBulkFrom]=useState(1);
  const[bulkTo,setBulkTo]=useState(33);
  const[bulkPad,setBulkPad]=useState(true);
  const[bulkSkipExisting,setBulkSkipExisting]=useState(true);
  const getBulkPreview=()=>{
    const from=parseInt(bulkFrom)||1;
    const to=parseInt(bulkTo)||1;
    if(from>to||to-from>99)return[];
    return Array.from({length:to-from+1},(_,i)=>{
      const n=from+i;
      const name=(bulkPrefix||'')+(bulkPad?String(n).padStart(2,'0'):n);
      return{name,exists:existingNames.has(name)};
    });
  };
  const doBulkAdd=()=>{
    const preview=getBulkPreview();
    const toAdd=bulkSkipExisting?preview.filter(p=>!p.exists):preview;
    if(!toAdd.length){alert('Nothing to add.');return;}
    setData(d=>({...d,townhouses:[...d.townhouses,...toAdd.map(({name})=>({id:uid(),name,villaTypes:[]}))]}));
    setShowBulkModal(false);
  };

  const BulkAddModal=()=>{
    const preview=getBulkPreview();
    const toAdd=bulkSkipExisting?preview.filter(p=>!p.exists):preview;
    return h(Modal,{title:'Bulk Add Townhouses',onClose:()=>setShowBulkModal(false),
      footer:[
        h('button',{className:'btn btn-ghost',onClick:()=>setShowBulkModal(false)},'Cancel'),
        h('button',{className:'btn btn-amber',onClick:doBulkAdd,disabled:toAdd.length===0},
          h(Icon,{name:'plus',size:14}),'Add '+toAdd.length+' Townhouse'+(toAdd.length!==1?'s':''))

/* ============ MONTHLY IPT PAGE ============ */
const MonthlyIPTPage=({data,setData,selMonth,selYear})=>{
  const curKey=`${selYear}-${String(selMonth+1).padStart(2,'0')}`;
  const ipt=data.ipt||{};
  const curIPT=ipt[curKey]||{disciplines:{}};

  const villaTypeDB=data.villaTypeDB||VILLA_TYPE_PRESETS.map((n,i)=>({id:`vt${i+1}`,name:n,description:'',color:'#2563eb'}));
  const dryCosts=data.dryCosts||{};
  const sortedTHs=[...data.townhouses].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));

  // Weighted IPT cost for one activity across all villa types in a TH, for a given %
  // cost = sum_over_vt( drycost[vt][act][field] * qty[vt] ) * pct/100
  const calcIPTCost=(th,actId,field,pct)=>{
    if(!pct)return 0;
    let weighted=0;
    th.villaTypes.forEach(vt=>{
      const qty=parseInt(vt.count)||0;
      if(!qty)return;
      const dc=(dryCosts[vt.type]||{})[actId]||{};
      weighted+=(parseFloat(dc[field])||0)*qty;
    });
    return weighted*(pct/100);
  };

  // Get cumulative % used across all months for a TH+act+field
  const getUsedPct=(thId,actId,field)=>{
    let used=0;
    Object.values(ipt).forEach(entry=>{
      const disc=entry.disciplines||{};
      Object.values(disc).forEach(catData=>{
        (catData.rows||[]).forEach(row=>{
          if(row.thId===thId&&row.actId===actId){
            used+=parseFloat(row[field+'Pct'])||0;
          }
        });
      });
    });
    return used;
  };

  // State for the IPT table — organized as disciplines > rows
  // curIPT.disciplines = { cat: { rows: [{thId,actId,matPct,instPct,remarks}] } }
  const[editMode,setEditMode]=useState(false);
  const[localDisc,setLocalDisc]=useState(()=>{
    const d={};
    CATEGORIES.forEach(cat=>{
      d[cat]={rows:(curIPT.disciplines?.[cat]?.rows||[]).map(r=>({...r}))};
    });
    return d;
  });
  const[selCat,setSelCat]=useState(CATEGORIES[0]);
  const[addActId,setAddActId]=useState('');
  const[addThId,setAddThId]=useState('');
  const[selDisc,setSelDisc]=useState('all');

  const getSortedActs=(cat)=>[...data.activities.filter(a=>a.category===cat)].sort((a,b)=>(a.order||0)-(b.order||0));

  const addRow=()=>{
    if(!addActId||!addThId)return;
    const existing=(localDisc[selCat].rows||[]).find(r=>r.thId===addThId&&r.actId===addActId);
    if(existing){alert('This TH + Activity combination already exists.');return;}
    setLocalDisc(d=>({...d,[selCat]:{rows:[...(d[selCat].rows||[]),{id:uid(),thId:addThId,actId:addActId,matPct:0,instPct:0,remarks:''}]}}));
    setAddActId('');
  };

  const removeRow=(cat,idx)=>{
    setLocalDisc(d=>({...d,[cat]:{rows:d[cat].rows.filter((_,i)=>i!==idx)}}));
  };

  const updateRow=(cat,idx,field,val)=>{
    setLocalDisc(d=>{
      const rows=[...d[cat].rows];
      rows[idx]={...rows[idx],[field]:val};
      return{...d,[cat]:{rows}};
    });
  };

  const saveIPT=()=>{
    setData(d=>{
      const newIpt={...(d.ipt||{})};
      newIpt[curKey]={disciplines:JSON.parse(JSON.stringify(localDisc))};
      return{...d,ipt:newIpt};
    });
    setEditMode(false);
  };

  const cancelEdit=()=>{
    const d={};
    CATEGORIES.forEach(cat=>{
      d[cat]={rows:(curIPT.disciplines?.[cat]?.rows||[]).map(r=>({...r}))};
    });
    setLocalDisc(d);
    setEditMode(false);
  };

  // Compute totals
  const computeTotals=(cat)=>{
    let mat=0,inst=0;
    (localDisc[cat]?.rows||[]).forEach(row=>{
      const th=data.townhouses.find(t=>t.id===row.thId);
      if(!th)return;
      mat+=calcIPTCost(th,row.actId,'mat',parseFloat(row.matPct)||0);
      inst+=calcIPTCost(th,row.actId,'inst',parseFloat(row.instPct)||0);
    });
    return{mat,inst};
  };

  const CAT_COLOR={Electrical:'#2563eb',Plumbing:'#d97706',HVAC:'#0d9488'};
  const CAT_BG={Electrical:'#dbeafe',Plumbing:'#fef3c7',HVAC:'#ccfbf1'};
  const CAT_LIGHT={Electrical:'#eff6ff',Plumbing:'#fffbeb',HVAC:'#f0fdfa'};

  const exportIPTPDF=()=>{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    const pw=doc.internal.pageSize.getWidth(); // 297
    const ph=doc.internal.pageSize.getHeight(); // 210
    const ML=10,MR=10,MT=32,MB=12;
    const CW=pw-ML-MR;

    const projName=(data.projectInfo||{}).projectName||'TAORMINA VILLAGE-01';
    const compName=(data.projectInfo||{}).companyName||'MODUN GULF BUILDING CONTRACTING LLC';
    const brandName=(data.projectInfo||{}).brandName||'Sdmbrk Collections';
    const monthLabel=MONTHS[selMonth]+' '+selYear;
    const dateStr=new Date().toLocaleDateString('en-AE');
    const catColorsRGB={Electrical:[37,99,235],Plumbing:[217,119,6],HVAC:[13,148,136]};

    // Column widths (landscape A4 = 277mm usable)
    const COL={act:52,th:18,villas:22,mat:32,inst:32,matPct:16,instPct:16,usedMat:18,remarks:CW-52-18-22-32-32-16-16-18};

    let pageNum=0;

    const drawPageHeader=()=>{
      pageNum++;
      // Title banner
      doc.setFillColor(30,45,69);
      doc.rect(0,0,pw,18,'F');
      doc.setTextColor(245,200,66);doc.setFontSize(10);doc.setFont('helvetica','bold');
      doc.text('MEP — TARGET COST BREAKDOWN AS PER IPT',ML,7);
      doc.setTextColor(200,216,238);doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.text('1st '+monthLabel+' to '+lastDayOfMonth(selMonth,selYear)+'th '+monthLabel,ML,13);
      doc.setTextColor(245,200,66);doc.setFontSize(8);doc.setFont('helvetica','bold');
      doc.text(projName,pw/2,7,{align:'center'});
      doc.setTextColor(200,216,238);doc.setFontSize(6.5);doc.setFont('helvetica','normal');
      doc.text(compName,pw/2,13,{align:'center'});
      doc.setTextColor(180,200,220);doc.setFontSize(6);
      doc.text(brandName+' | '+dateStr,pw-MR,7,{align:'right'});
      doc.text('Page '+pageNum,pw-MR,13,{align:'right'});
    };

    const drawColHeaders=(y,catRGB,catName)=>{
      const headers=[catName,'TH','Villas','Material Cost (AED)','Install Cost (AED)','Mat %','Inst %','Used Mat%','Remarks'];
      const widths=[COL.act,COL.th,COL.villas,COL.mat,COL.inst,COL.matPct,COL.instPct,COL.usedMat,COL.remarks];
      const aligns=['left','center','center','right','right','center','center','center','left'];
      let x=ML;
      headers.forEach((hdr,i)=>{
        doc.setFillColor(catRGB[0],catRGB[1],catRGB[2]);
        doc.rect(x,y,widths[i],6,'F');
        doc.setTextColor(255,255,255);doc.setFontSize(6.5);doc.setFont('helvetica','bold');
        doc.text(hdr,aligns[i]==='right'?x+widths[i]-1.5:aligns[i]==='center'?x+widths[i]/2:x+1.5,y+4.2,{align:aligns[i]==='right'?'right':aligns[i]==='center'?'center':'left'});
        x+=widths[i];
      });
      return y+6;
    };

    const fmtN=(n)=>n>0?n.toLocaleString('en-AE',{minimumFractionDigits:0,maximumFractionDigits:0}):'—';

    drawPageHeader();
    let y=MT;

    // Summary row at top
    const grandTotPDF=(()=>{let m=0,i=0;CATEGORIES.forEach(c=>{const t=computeTotals(c);m+=t.mat;i+=t.inst;});return{mat:m,inst:i};})();
    doc.setFillColor(245,200,66);
    doc.rect(0,y,pw,6,'F');
    doc.setTextColor(30,45,69);doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.text('GRAND TOTAL — ALL DISCIPLINES',ML,y+4.2);
    doc.text('Material: AED '+fmtN(grandTotPDF.mat),ML+CW*0.45,y+4.2);
    doc.text('Installation: AED '+fmtN(grandTotPDF.inst),ML+CW*0.65,y+4.2);
    doc.text('TOTAL: AED '+fmtN(grandTotPDF.mat+grandTotPDF.inst),pw-MR,y+4.2,{align:'right'});
    y+=8;

    CATEGORIES.forEach((cat,ci)=>{
      const rows=localDisc[cat]?.rows||[];
      if(rows.length===0)return;
      const acts=getSortedActs(cat);
      const grouped={};
      rows.forEach(row=>{if(!grouped[row.actId])grouped[row.actId]=[];grouped[row.actId].push(row);});
      const catRGB=catColorsRGB[cat];
      const totals=computeTotals(cat);
      const ROW_H=5.8;

      // Check space for discipline header + col headers + at least 2 rows
      if(y+14+2*ROW_H>ph-MB){
        doc.addPage();drawPageHeader();y=MT;
      }

      // Discipline title bar
      doc.setFillColor(...catRGB);
      doc.rect(0,y,pw,7,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont('helvetica','bold');
      doc.text(cat.toUpperCase(),ML,y+5);
      doc.text('Material: AED '+fmtN(totals.mat)+'   Installation: AED '+fmtN(totals.inst)+'   Total: AED '+fmtN(totals.mat+totals.inst),pw-MR,y+5,{align:'right'});
      y+=7;

      // Col headers
      y=drawColHeaders(y,catRGB,cat);

      // Activity rows (grouped by activity)
      acts.filter(act=>grouped[act.id]).forEach(act=>{
        const actRows=grouped[act.id];
        actRows.forEach((row,ri)=>{
          if(y+ROW_H>ph-MB){doc.addPage();drawPageHeader();y=MT;y=drawColHeaders(y,catRGB,'('+cat+' cont.)');}
          const th=data.townhouses.find(t=>t.id===row.thId);
          const matCost=th?calcIPTCost(th,act.id,'mat',parseFloat(row.matPct)||0):0;
          const instCost=th?calcIPTCost(th,act.id,'inst',parseFloat(row.instPct)||0):0;
          const usedMat=getUsedPct(row.thId,act.id,'mat');
          const totalVillas=th?th.villaTypes.reduce((s,v)=>s+(parseInt(v.count)||0),0):0;
          const villaStr=th?th.villaTypes.filter(v=>parseInt(v.count)>0).map(v=>v.count+'×'+v.type).join(', '):'—';
          const rowBg=ri%2===0?[255,255,255]:[248,250,252];
          doc.setFillColor(...rowBg);
          doc.rect(0,y,pw,ROW_H,'F');
          // left accent stripe
          doc.setFillColor(...catRGB.map(v=>Math.min(255,v+100)));
          doc.rect(0,y,1.2,ROW_H,'F');
          doc.setTextColor(26,34,51);doc.setFontSize(6.2);

          let x=ML+1.5;
          // Activity (only first row of group)
          doc.setFont('helvetica',ri===0?'bold':'normal');
          doc.setTextColor(26,34,51);
          if(ri===0)doc.text(doc.splitTextToSize(act.name,COL.act-3)[0],x,y+ROW_H-1.5);
          x+=COL.act-1.5;

          doc.setFont('helvetica','bold');doc.setTextColor(...catRGB);
          doc.text(th?th.name:'—',x+COL.th/2,y+ROW_H-1.5,{align:'center'});x+=COL.th;

          doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
          doc.text(String(totalVillas),x+COL.villas/2,y+ROW_H-1.5,{align:'center'});
          if(totalVillas>0){doc.setFontSize(5);doc.text(doc.splitTextToSize(villaStr,COL.villas-2)[0],x+1,y+ROW_H-0.3);}
          doc.setFontSize(6.2);x+=COL.villas;

          doc.setFont('helvetica','bold');doc.setTextColor(22,101,52);
          doc.text(matCost>0?fmtN(matCost):'—',x+COL.mat-1.5,y+ROW_H-1.5,{align:'right'});x+=COL.mat;

          doc.setTextColor(30,64,175);
          doc.text(instCost>0?fmtN(instCost):'—',x+COL.inst-1.5,y+ROW_H-1.5,{align:'right'});x+=COL.inst;

          doc.setTextColor(180,83,9);doc.setFont('helvetica','bold');
          doc.text(row.matPct>0?row.matPct+'%':'—',x+COL.matPct/2,y+ROW_H-1.5,{align:'center'});x+=COL.matPct;

          doc.setTextColor(30,64,175);
          doc.text(row.instPct>0?row.instPct+'%':'—',x+COL.instPct/2,y+ROW_H-1.5,{align:'center'});x+=COL.instPct;

          // Used mat% with mini bar
          const usedClamped=Math.min(100,usedMat);
          doc.setTextColor(usedMat>=100?220:usedMat>70?180:40,usedMat>=100?20:usedMat>70?90:130,20);
          doc.setFont('helvetica','normal');
          doc.text(usedMat.toFixed(0)+'%',x+COL.usedMat/2,y+ROW_H-2.5,{align:'center'});
          doc.setFillColor(220,220,220);doc.rect(x+1,y+ROW_H-1.6,COL.usedMat-2,1.2,'F');
          const barColor=usedMat>=100?[220,38,38]:usedMat>70?[245,158,11]:[34,197,94];
          doc.setFillColor(...barColor);doc.rect(x+1,y+ROW_H-1.6,(COL.usedMat-2)*usedClamped/100,1.2,'F');
          x+=COL.usedMat;

          doc.setTextColor(80,80,80);doc.setFont('helvetica','normal');
          if(row.remarks)doc.text(doc.splitTextToSize(row.remarks,COL.remarks-2)[0],x+1,y+ROW_H-1.5);

          // Row border
          doc.setDrawColor(210,210,210);doc.setLineWidth(0.1);
          doc.line(0,y+ROW_H,pw,y+ROW_H);
          y+=ROW_H;
        });
      });

      // Totals row
      if(y+6>ph-MB){doc.addPage();drawPageHeader();y=MT;}
      doc.setFillColor(253,224,71);
      doc.rect(0,y,pw,6,'F');
      doc.setTextColor(30,45,69);doc.setFontSize(7);doc.setFont('helvetica','bold');
      const tx=ML+COL.act+COL.th+COL.villas;
      doc.text('TOTAL',ML,y+4.2);
      doc.text(fmtN(totals.mat),tx+COL.mat-1.5,y+4.2,{align:'right'});
      doc.text(fmtN(totals.inst),tx+COL.mat+COL.inst-1.5,y+4.2,{align:'right'});
      doc.text('AED '+fmtN(totals.mat+totals.inst),pw-MR,y+4.2,{align:'right'});
      y+=8;
    });

    // Footer on last page
    doc.setDrawColor(180,180,180);doc.setLineWidth(0.15);
    doc.line(ML,ph-6,pw-MR,ph-6);
    doc.setTextColor(140,140,140);doc.setFontSize(5.5);doc.setFont('helvetica','normal');
    doc.text(brandName+' — '+compName+' — Confidential',ML,ph-3);
    doc.text('Generated: '+dateStr,pw-MR,ph-3,{align:'right'});

    doc.save('IPT_'+MONTHS[selMonth]+'_'+selYear+'.pdf');
  };

  // Group rows by activity for display (like the image — merged activity cells)
  const renderDisciplineTable=(cat)=>{
    const rows=localDisc[cat]?.rows||[];
    const acts=getSortedActs(cat);
    // Group: actId -> rows
    const grouped={};
    rows.forEach((row,ri)=>{
      if(!grouped[row.actId])grouped[row.actId]=[];
      grouped[row.actId].push({...row,_ri:ri});
    });
    const cc=CAT_COLOR[cat];
    const cbg=CAT_BG[cat];
    const cl=CAT_LIGHT[cat];
    const totals=computeTotals(cat);

    return h('div',{style:{marginBottom:28}},
      // Discipline header
      h('div',{style:{
        background:cc,color:'#fff',fontWeight:700,fontSize:15,
        textAlign:'center',padding:'8px 16px',letterSpacing:'.04em',
        borderRadius:'var(--radius) var(--radius) 0 0'
      }},cat.toUpperCase()),

      h('div',{style:{overflowX:'auto',border:'2px solid '+cc,borderTop:'none',borderRadius:'0 0 var(--radius) var(--radius)'}},
        h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12}},
          // Sub-header rows (match image layout)
          h('thead',null,
            h('tr',null,
              h('th',{style:{background:cbg,padding:'7px 10px',border:'1px solid #ccc',fontWeight:700,fontSize:11,minWidth:140}},cat),
              h('th',{style:{background:cbg,padding:'7px 10px',border:'1px solid #ccc',fontWeight:700,fontSize:11,minWidth:70,textAlign:'center'}},'TH'),
              h('th',{style:{background:cbg,padding:'7px 10px',border:'1px solid #ccc',fontWeight:700,fontSize:11,minWidth:80,textAlign:'center'}},'Villas'),
              h('th',{style:{background:'#dcfce7',padding:'7px 10px',border:'1px solid #ccc',fontWeight:700,fontSize:11,minWidth:110,textAlign:'right'}},'Material Cost'),
              h('th',{style:{background:'#dbeafe',padding:'7px 10px',border:'1px solid #ccc',fontWeight:700,fontSize:11,minWidth:110,textAlign:'right'}},'Install Cost'),
              h('th',{style:{background:'#fef9c3',padding:'7px 10px',border:'1px solid #ccc',fontWeight:700,fontSize:11,minWidth:70,textAlign:'center'}},'Mat %'),
              h('th',{style:{background:'#e0f2fe',padding:'7px 10px',border:'1px solid #ccc',fontWeight:700,fontSize:11,minWidth:70,textAlign:'center'}},'Inst %'),
              h('th',{style:{background:'#f0fdf4',padding:'7px 10px',border:'1px solid #ccc',fontWeight:700,fontSize:11,minWidth:90,textAlign:'center'}},'Used Mat'),
              h('th',{style:{background:'#fdf4ff',padding:'7px 10px',border:'1px solid #ccc',fontWeight:700,fontSize:11,minWidth:100,textAlign:'left'}},'Remarks'),
              editMode&&h('th',{style:{background:'#fee2e2',padding:'7px 6px',border:'1px solid #ccc',width:36}})
            )
          ),
          h('tbody',null,
            // Render grouped by activity
            ...acts.filter(act=>grouped[act.id]&&grouped[act.id].length>0).flatMap(act=>{
              const actRows=grouped[act.id];
              return actRows.map((row,ri)=>{
                const th=data.townhouses.find(t=>t.id===row.thId);
                const matCost=th?calcIPTCost(th,act.id,'mat',parseFloat(row.matPct)||0):0;
                const instCost=th?calcIPTCost(th,act.id,'inst',parseFloat(row.instPct)||0):0;
                const usedMat=getUsedPct(row.thId,act.id,'mat');
                const usedInst=getUsedPct(row.thId,act.id,'inst');
                const balMat=Math.max(0,100-usedMat);
                // Villa info for this TH
                const villaInfo=th?th.villaTypes.filter(v=>parseInt(v.count)>0).map(v=>`${v.count} ${v.type}`).join(', '):'—';
                const totalVillas=th?th.villaTypes.reduce((s,v)=>s+(parseInt(v.count)||0),0):0;
                const rowBg=ri%2===0?'#fff':cl;
                return h('tr',{key:row.id||ri,style:{background:rowBg}},
                  // Activity name — only first row of group shows it (merged style)
                  ri===0
                    ?h('td',{rowSpan:actRows.length,style:{
                        padding:'8px 10px',border:'1px solid #ddd',
                        fontWeight:600,fontSize:12,color:'#1a2233',
                        background:cl,verticalAlign:'middle',textAlign:'center',
                        borderLeft:'3px solid '+cc
                      }},act.name)
                    :null,
                  h('td',{style:{padding:'6px 10px',border:'1px solid #ddd',textAlign:'center',fontWeight:700,color:cc}},th?th.name:'—'),
                  h('td',{style:{padding:'6px 8px',border:'1px solid #ddd',textAlign:'center',fontSize:11,color:'#555'}},
                    totalVillas>0?h('div',null,
                      h('div',{style:{fontWeight:700,fontSize:12}},totalVillas),
                      h('div',{style:{fontSize:9,color:'#888',marginTop:1}},villaInfo)
                    ):'—'
                  ),
                  h('td',{style:{padding:'6px 10px',border:'1px solid #ddd',textAlign:'right',fontFamily:'monospace',fontWeight:600,color:'#166534',background:'#f0fdf4'}},
                    matCost>0?fmt(matCost):'—'
                  ),
                  h('td',{style:{padding:'6px 10px',border:'1px solid #ddd',textAlign:'right',fontFamily:'monospace',fontWeight:600,color:'#1e40af',background:'#eff6ff'}},
                    instCost>0?fmt(instCost):'—'
                  ),
                  // Mat %
                  h('td',{style:{padding:'4px 6px',border:'1px solid #ddd',textAlign:'center',background:'#fefce8'}},
                    editMode
                      ?h('input',{type:'number',min:0,max:100,step:1,value:row.matPct||'',placeholder:'0',
                          onChange:e=>updateRow(cat,row._ri,'matPct',Math.min(100,Math.max(0,parseFloat(e.target.value)||0))),
                          style:{width:54,textAlign:'center',border:'1px solid #d97706',borderRadius:3,padding:'3px 4px',fontSize:12,fontWeight:700,background:'#fffbeb'}})
                      :h('span',{style:{fontWeight:700,fontFamily:'monospace',color:row.matPct>0?'#b45309':'#aaa'}},
                          row.matPct>0?row.matPct+'%':'—')
                  ),
                  // Inst %
                  h('td',{style:{padding:'4px 6px',border:'1px solid #ddd',textAlign:'center',background:'#eff6ff'}},
                    editMode
                      ?h('input',{type:'number',min:0,max:100,step:1,value:row.instPct||'',placeholder:'0',
                          onChange:e=>updateRow(cat,row._ri,'instPct',Math.min(100,Math.max(0,parseFloat(e.target.value)||0))),
                          style:{width:54,textAlign:'center',border:'1px solid #2563eb',borderRadius:3,padding:'3px 4px',fontSize:12,fontWeight:700,background:'#dbeafe'}})
                      :h('span',{style:{fontWeight:700,fontFamily:'monospace',color:row.instPct>0?'#1d4ed8':'#aaa'}},
                          row.instPct>0?row.instPct+'%':'—')
                  ),
                  // Used mat % with bar
                  h('td',{style:{padding:'6px 8px',border:'1px solid #ddd',textAlign:'center'}},
                    h('div',{style:{fontSize:10,fontWeight:600,color:usedMat>=100?'#dc2626':usedMat>70?'#d97706':'#16a34a'}},usedMat.toFixed(0),'%'),
                    h('div',{style:{height:5,background:'#e5e7eb',borderRadius:3,marginTop:3,overflow:'hidden'}},
                      h('div',{style:{height:'100%',width:Math.min(100,usedMat)+'%',background:usedMat>=100?'#dc2626':usedMat>70?'#f59e0b':'#22c55e',borderRadius:3}})
                    ),
                    h('div',{style:{fontSize:9,color:'#888',marginTop:2}},'Bal: ',h('b',{style:{color:balMat<=0?'#dc2626':'#555'}},balMat.toFixed(0),'%'))
                  ),
                  // Remarks
                  h('td',{style:{padding:'4px 6px',border:'1px solid #ddd'}},
                    editMode
                      ?h('input',{type:'text',value:row.remarks||'',placeholder:'Notes...',
                          onChange:e=>updateRow(cat,row._ri,'remarks',e.target.value),
                          style:{width:'100%',border:'1px solid #d1d5db',borderRadius:3,padding:'3px 6px',fontSize:11}})
                      :h('span',{style:{fontSize:11,color:'#555'}},row.remarks||'')
                  ),
                  editMode&&h('td',{style:{padding:'4px',border:'1px solid #ddd',textAlign:'center'}},
                    h('button',{onClick:()=>removeRow(cat,row._ri),style:{border:'none',background:'none',cursor:'pointer',color:'#dc2626',fontSize:14,fontWeight:700}},'✕')
                  )
                );
              });
            }),
            // Empty state
            rows.length===0&&h('tr',null,
              h('td',{colSpan:editMode?10:9,style:{padding:'20px',textAlign:'center',color:'#9ca3af',fontSize:13,fontStyle:'italic'}},
                editMode?'Use the form below to add activities':'No activities added yet — click Edit to start')
            ),
            // Totals row
            rows.length>0&&h('tr',{style:{background:'#fde047'}},
              h('td',{colSpan:3,style:{padding:'8px 12px',border:'2px solid #333',fontWeight:700,fontSize:13,textAlign:'right'}},'TOTAL'),
              h('td',{style:{padding:'8px 10px',border:'2px solid #333',textAlign:'right',fontFamily:'monospace',fontWeight:700,color:'#166534',fontSize:13}},
                totals.mat>0?fmt(totals.mat):'—'
              ),
              h('td',{style:{padding:'8px 10px',border:'2px solid #333',textAlign:'right',fontFamily:'monospace',fontWeight:700,color:'#1e40af',fontSize:13}},
                totals.inst>0?fmt(totals.inst):'—'
              ),
              h('td',{colSpan:editMode?5:4,style:{padding:'8px 10px',border:'2px solid #333',textAlign:'right',fontFamily:'monospace',fontWeight:700,fontSize:13}},
                fmt(totals.mat+totals.inst)
              )
            )
          )
        )
      ),

      // Add row form — only in edit mode
      editMode&&h('div',{style:{
        marginTop:8,padding:'12px 14px',background:'#f8fafc',
        border:'1px dashed #94a3b8',borderRadius:'var(--radius)',display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap'
      }},
        h('div',{style:{flex:2,minWidth:160}},
          h('label',{style:{fontSize:11,fontWeight:600,color:'#64748b',display:'block',marginBottom:4}},'Activity'),
          h('select',{value:addActId,onChange:e=>setAddActId(e.target.value),style:{width:'100%'}},
            h('option',{value:''},'-- Select Activity --'),
            getSortedActs(cat).map(a=>h('option',{key:a.id,value:a.id},a.name))
          )
        ),
        h('div',{style:{flex:1,minWidth:130}},
          h('label',{style:{fontSize:11,fontWeight:600,color:'#64748b',display:'block',marginBottom:4}},'Townhouse'),
          h('select',{value:addThId,onChange:e=>setAddThId(e.target.value),style:{width:'100%'}},
            h('option',{value:''},'-- Select TH --'),
            sortedTHs.map(th=>{
              const total=th.villaTypes.reduce((s,v)=>s+(parseInt(v.count)||0),0);
              return h('option',{key:th.id,value:th.id},th.name+(total>0?' ('+total+' villas)':' — empty'));
            })
          )
        ),
        h('button',{className:'btn btn-amber',onClick:addRow,style:{flexShrink:0}},h(Icon,{name:'plus',size:13}),'Add Row')
      )
    );
  };

  // Grand totals across all disciplines
  const grandTotals=(()=>{
    let mat=0,inst=0;
    CATEGORIES.forEach(cat=>{const t=computeTotals(cat);mat+=t.mat;inst+=t.inst;});
    return{mat,inst};
  })();

  const dispCats=selDisc==='all'?CATEGORIES:[selDisc];

  return h('div',null,
    // Page header
    h('div',{className:'page-header'},
      h('div',null,
        h('div',{className:'page-title'},'MEP IPT — ',MONTHS[selMonth],' ',selYear),
        h('div',{className:'page-sub'},'In-Progress Tracking — Material & Installation cost breakdown by activity and TH block')
      ),
      h('div',{className:'header-actions'},
        h('button',{className:'btn btn-ghost',onClick:exportIPTPDF},h(Icon,{name:'download',size:14}),'Export PDF'),
        editMode
          ?h('div',{style:{display:'flex',gap:8}},
              h('button',{className:'btn btn-ghost',onClick:cancelEdit},'Cancel'),
              h('button',{className:'btn btn-green',onClick:saveIPT},h(Icon,{name:'check',size:14}),'Save IPT')
            )
          :h('button',{className:'btn btn-amber',onClick:()=>setEditMode(true)},h(Icon,{name:'edit',size:14}),'Edit IPT')
      )
    ),
    h('div',{className:'content'},

      // Title banner (matches image)
      h('div',{style:{
        background:'#1e2d45',color:'#f5c842',fontWeight:800,fontSize:15,
        textAlign:'center',padding:'10px',letterSpacing:'.05em',
        borderRadius:'var(--radius)',marginBottom:4,border:'2px solid #f5c842'
      }},
        h('div',null,'MEP — TARGET COST BREAKDOWN AS PER IPT'),
        h('div',{style:{fontSize:13,fontWeight:600,marginTop:4,letterSpacing:'.02em'}},
          '1st '+MONTHS[selMonth]+' to '+lastDayOfMonth(selMonth,selYear)+'th '+MONTHS[selMonth]+' '+selYear
        )
      ),
      h(ProjectBanner,{data,setData}),

      // Summary cards
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr) 1.2fr',gap:12,marginBottom:20}},
        ...CATEGORIES.map(cat=>{
          const t=computeTotals(cat);
          const cc=CAT_COLOR[cat];
          return h('div',{key:cat,style:{background:'#fff',borderTop:'3px solid '+cc,border:'1px solid '+cc+'33',borderRadius:'var(--radius2)',padding:'12px 16px'}},
            h('div',{style:{fontSize:10,fontWeight:700,color:cc,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:8}},cat),
            h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}},
              h('div',{style:{background:'#f0fdf4',borderRadius:'var(--radius)',padding:'7px 10px'}},
                h('div',{style:{fontSize:9,color:'#888',marginBottom:2}},'MATERIAL'),
                h('div',{style:{fontFamily:'monospace',fontWeight:700,fontSize:12,color:'#166534'}},t.mat>0?fmt(t.mat):'—')
              ),
              h('div',{style:{background:'#eff6ff',borderRadius:'var(--radius)',padding:'7px 10px'}},
                h('div',{style:{fontSize:9,color:'#888',marginBottom:2}},'INSTALLATION'),
                h('div',{style:{fontFamily:'monospace',fontWeight:700,fontSize:12,color:'#1e40af'}},t.inst>0?fmt(t.inst):'—')
              )
            )
          );
        }),
        h('div',{style:{background:'linear-gradient(135deg,#1e2d45,#2d4a6e)',borderRadius:'var(--radius2)',padding:'12px 16px'}},
          h('div',{style:{fontSize:10,fontWeight:700,color:'#f5c842',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}},'Grand Total'),
          h('div',{style:{fontFamily:'monospace',fontWeight:800,fontSize:18,color:'#f5c842',marginBottom:6}},grandTotals.mat+grandTotals.inst>0?fmt(grandTotals.mat+grandTotals.inst):'—'),
          h('div',{style:{display:'flex',gap:12}},
            h('div',null,h('div',{style:{fontSize:9,color:'#7a99bb'}},'Material'),h('div',{style:{fontFamily:'monospace',fontWeight:700,fontSize:11,color:'#4ade80'}},grandTotals.mat>0?fmt(grandTotals.mat):'—')),
            h('div',null,h('div',{style:{fontSize:9,color:'#7a99bb'}},'Installation'),h('div',{style:{fontFamily:'monospace',fontWeight:700,fontSize:11,color:'#60a5fa'}},grandTotals.inst>0?fmt(grandTotals.inst):'—'))
          )
        )
      ),

      // Discipline filter tabs
      h('div',{style:{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}},
        [{id:'all',label:'All Disciplines'},...CATEGORIES.map(c=>({id:c,label:c}))].map(({id,label})=>
          h('button',{key:id,onClick:()=>setSelDisc(id),style:{
            padding:'6px 16px',border:'2px solid '+(id==='all'?'#1e2d45':CAT_COLOR[id]||'#1e2d45'),
            borderRadius:20,background:selDisc===id?(id==='all'?'#1e2d45':CAT_COLOR[id]):'#fff',
            color:selDisc===id?'#fff':(id==='all'?'#1e2d45':CAT_COLOR[id]),
            fontWeight:600,fontSize:12,cursor:'pointer',transition:'all .15s'
          }},label)
        )
      ),

      // Add row: discipline selector (only in edit mode)
      editMode&&h('div',{style:{marginBottom:12,display:'flex',alignItems:'center',gap:10}},
        h('label',{style:{fontSize:12,fontWeight:600,color:'var(--text2)'}},'Adding to:'),
        CATEGORIES.map(cat=>h('button',{key:cat,onClick:()=>setSelCat(cat),style:{
          padding:'4px 14px',border:`2px solid ${CAT_COLOR[cat]}`,borderRadius:20,
          background:selCat===cat?CAT_COLOR[cat]:'#fff',
          color:selCat===cat?'#fff':CAT_COLOR[cat],
          fontWeight:600,fontSize:12,cursor:'pointer'
        }},cat))
      ),

      // Discipline tables
      ...dispCats.map(cat=>renderDisciplineTable(cat))
    )
  );
};


const App=()=>{
  const[page,setPage]=useState('dashboard');
  const[selMonth,setSelMonth]=useState(today.getMonth());
  const[selYear,setSelYear]=useState(CY);
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[data,setData]=useState(()=>{
    const saved=loadStore();
    if(saved)return saved;
    const seed=seedData();
    return{...seed,entries:{}};
  });

  useEffect(()=>saveStore(data),[data]);

  const setDataAndSave=(updater)=>{
    setData(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      saveStore(next);return next;
    });
  };

  const navItems=[
    {id:'dashboard',label:'Dashboard',icon:'dashboard'},
    {id:'ipt',label:'Monthly IPT',icon:'calendar'},
    {id:'drycost',label:'Dry Cost',icon:'layers'},
    {id:'setup',label:'Setup',icon:'settings'},
  ];

  const navigate=(id)=>{setPage(id);setSidebarOpen(false);};

  const Sidebar=()=>h('div',{className:'sidebar'+(sidebarOpen?' open':'')},
    h('div',{className:'logo'},
      h('div',{className:'logo-title'},'MEP IPT Tracker'),
      h('div',{className:'logo-sub'},'In-Progress Tracking')
    ),
    h('div',{className:'nav'},
      h('div',{className:'nav-section'},'Menu'),
      navItems.map(n=>h('div',{key:n.id,
        className:'nav-item'+(page===n.id?' active':''),
        onClick:()=>navigate(n.id)
      },h(Icon,{name:n.icon,size:16}),n.label))
    ),
    h('div',{className:'sidebar-footer'},data.projectInfo?.brandName||'Sdmbrk Collections')
  );

  return h('div',{className:'app'},
    // Mobile sidebar overlay
    h('div',{
      className:'sidebar-overlay'+(sidebarOpen?' open':''),
      onClick:()=>setSidebarOpen(false)
    }),

    h(Sidebar,null),

    h('div',{className:'main'},
      // Mobile top bar (hidden on desktop via CSS)
      h('div',{className:'mobile-topbar'},
        h('button',{
          className:'hamburger'+(sidebarOpen?' open':''),
          onClick:()=>setSidebarOpen(o=>!o),
          'aria-label':'Menu'
        },
          h('span',null),h('span',null),h('span',null)
        ),
        h('div',{style:{flex:1}},
          h('div',{className:'mobile-topbar-title'},'MEP IPT Tracker'),
          h('div',{className:'mobile-topbar-sub'},navItems.find(n=>n.id===page)?.label||'')
        ),
        // Year selector on mobile topbar
        page==='ipt'&&h('select',{
          value:selYear,
          onChange:e=>setSelYear(parseInt(e.target.value)),
          style:{width:72,fontSize:11,padding:'3px 4px',flexShrink:0,background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',color:'#f5c842',borderRadius:4}
        },
          [CY-1,CY,CY+1].map(y=>h('option',{key:y,value:y,style:{background:'#1e2d45'}},y))
        )
      ),

      // Month pill bar (dashboard + ipt only)
      (page==='ipt')&&h('div',{className:'month-bar'},
        h('span',{className:'month-label'},'Month:'),
        MONTHS.map((m,i)=>h('div',{key:m,className:'month-pill'+(selMonth===i?' active':''),onClick:()=>setSelMonth(i)},m)),
        h('select',{value:selYear,onChange:e=>setSelYear(parseInt(e.target.value)),style:{width:80,marginLeft:4,flexShrink:0}},
          [CY-1,CY,CY+1].map(y=>h('option',{key:y,value:y},y))
        )
      ),

      page==='dashboard'&&h(DashboardPage,{data,selMonth,selYear}),
      page==='ipt'&&h(MonthlyIPTPage,{data,setData:setDataAndSave,selMonth,selYear}),
      page==='drycost'&&h(DryCostPage,{data,setData:setDataAndSave}),
      page==='setup'&&h(SetupPage,{data,setData:setDataAndSave}),

      // Mobile bottom navigation bar
      h('nav',{className:'mobile-bottom-nav'},
        navItems.map(n=>h('div',{
          key:n.id,
          className:'mobile-bottom-item'+(page===n.id?' active':''),
          onClick:()=>setPage(n.id)
        },
          h(Icon,{name:n.icon,size:22}),
          h('span',null,n.label)
        ))
      )
    )
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
